{% extends "base.html" %}
{% block content %}

<h2 class="text-xl font-bold mb-4">
Edit Expense
</h2>

<form method="post"
class="grid gap-3 max-w-md">

<input name="description"
value="{{ e.description }}"
required
class="bg-slate-800 text-white p-2 rounded">

<input name="amount"
type="number"
step="0.01"
value="{{ e.amount }}"
required
class="bg-slate-800 text-white p-2 rounded">

<select name="category"
class="bg-slate-800 text-white p-2 rounded">

{% for c in categories %}

<option value="{{ c }}"
{% if c == e.category %}
selected
{% endif %}>
{{ c }}
</option>

{% endfor %}

</select>

<input name="date"
type="date"
value="{{ e.date.isoformat() }}"
required
class="bg-slate-800 text-white p-2 rounded">

<button
class="bg-green-600 text-white p-2 rounded">
Save Changes
</button>

</form>

{% endblock %}
